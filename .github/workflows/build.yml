name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Restore signing keystore from cache
        id: keystore-cache
        uses: actions/cache@v4
        with:
          path: app/tagebuch.keystore
          key: signing-keystore-v1

      - name: Generate keystore if not cached
        if: steps.keystore-cache.outputs.cache-hit != 'true'
        run: |
          keytool -genkeypair -v \
            -keystore app/tagebuch.keystore \
            -alias tagebuchkey \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass tagebuch2024 -keypass tagebuch2024 \
            -dname "CN=Tagebuch App,O=PBrockt,C=DE" -noprompt

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tagebuch-App-v0.1d
          path: app/build/outputs/apk/release/Tagebuch-App-v0.1d.apk
          retention-days: 90
